{% extends "base.html" %}

{% block title %}{% if product %}Edit{% else %}Add{% endif %} Product - Admin{% endblock %}

{% block content %}
<section class="admin-section">
    <div class="container">
        <div class="admin-header">
            <h1>{% if product %}Edit Product{% else %}Add New Product{% endif %}</h1>
            <a href="{{ url_for('admin_products') }}" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Back to Products
            </a>
        </div>

        <div class="admin-form-wrapper">
            <form method="POST" class="admin-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Product Name *</label>
                        <input type="text" id="name" name="name" value="{{ product.name if product else '' }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" name="category" required>
                            <option value="">Select Category</option>
                            {% for cat in categories %}
                            <option value="{{ cat }}" {% if product and product.category == cat %}selected{% endif %}>
                                {{ cat }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4">{{ product.description if product else '' }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price *</label>
                        <input type="number" id="price" name="price" step="0.01" min="0" 
                               value="{{ "%.2f"|format(product.price|float) if product else '' }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="stock">Stock Quantity *</label>
                        <input type="number" id="stock" name="stock" min="0" 
                               value="{{ product.stock if product else '0' }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="image">Image URL *</label>
                    <input type="url" id="image" name="image" 
                           value="{{ product.image if product else '' }}" required>
                    {% if product %}
                    <div style="margin-top: 0.5rem;">
                        <img src="{{ product.image }}" alt="Current image" style="max-width: 200px; border-radius: 0.5rem;">
                    </div>
                    {% endif %}
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="featured" value="1" 
                               {% if product and product.featured %}checked{% endif %}>
                        <span>Featured Product</span>
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-large">
                        <i class="fas fa-save"></i> {% if product %}Update{% else %}Add{% endif %} Product
                    </button>
                    <a href="{{ url_for('admin_products') }}" class="btn btn-outline btn-large">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
